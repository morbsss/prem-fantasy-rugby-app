name: Grand Final scrape

# Drives /api/cron/player-data for the round-18 grand final without needing
# Vercel Pro crons. GitHub's own cron can't fire every 3 min (5-min minimum,
# best-effort timing), so we start ONE job near the window and loop internally:
# curl -> sleep 180 -> curl, until 16:00 UTC. A single job can run for hours.
#
# NOTE: scheduled runs only fire from the repo's DEFAULT branch (main). Merge
# this to main before 6 Jun or it won't trigger. workflow_dispatch works from
# any branch as a manual backup.
#
# Required repo secrets (Settings -> Secrets and variables -> Actions):
#   APP_BASE_URL  e.g. https://prem-fantasy-rugby-app.vercel.app  (no trailing /api)
#   CRON_SECRET   same value as the Vercel CRON_SECRET env var (omit if unset server-side)

on:
  workflow_dispatch:
  schedule:
    # Sat 6 Jun — start 13:55 UTC, loop scrapes every 3 min until 16:00 UTC (3-5pm BST)
    - cron: '55 13 6 6 *'
    # Mon 8 Jun 13:00 UTC (2pm BST) — single settle update
    - cron: '0 13 8 6 *'

# Never let two copies overlap (e.g. a delayed schedule + a manual run)
concurrency:
  group: grand-final-scrape
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Scrape player data
        env:
          APP_BASE_URL: ${{ secrets.APP_BASE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          set -uo pipefail

          if [ -z "${APP_BASE_URL:-}" ]; then
            echo "::error::APP_BASE_URL secret is not set"; exit 1
          fi
          URL="${APP_BASE_URL%/}/api/cron/player-data"

          # Scrape, pinned to a fixed round via ?round=N (live ticks all update
          # round 18; the pre-kickoff baseline writes round 17).
          hit() {
            local r="$1" code
            code=$(curl -sS -o /tmp/resp.json -w '%{http_code}' \
              -H "Authorization: Bearer ${CRON_SECRET:-}" \
              "${URL}?round=${r}") || code="000"
            echo "[$(date -u '+%H:%M:%SZ')] round=${r} HTTP ${code} $(head -c 200 /tmp/resp.json 2>/dev/null)"
            if [ "$code" != "200" ]; then
              echo "::warning::scrape (round ${r}) returned HTTP ${code}"
            fi
          }

          # 16:00 UTC today = 5pm BST.
          END=$(date -u -d '16:00:00' +%s)
          TODAY=$(date -u +%m-%d)

          echo "Scraping ${URL}"
          if [ "$TODAY" = "06-06" ]; then
            # Grand-final Saturday: lay the pre-kickoff baseline, then scrape
            # round 18 every 3 min until 16:00 UTC.
            echo "Baseline snapshot -> round 17"
            hit 17
            while true; do
              hit 18
              [ "$(date -u +%s)" -ge "$END" ] && break
              sleep 180
            done
          else
            # Monday settle update (baseline already exists): single round-18 tick.
            hit 18
          fi
          echo "Done."
